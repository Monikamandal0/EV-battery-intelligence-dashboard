        const [selectedVehicle, setSelectedVehicle] = useState('Select Vehicle');

          'EV-001': 0,
          'EV-002': 0,
          'EV-003': 0,
          'EV-004': 0
        });

        const [hasLoaded, setHasLoaded] = useState(false);
        const [ev3DrainOffset, setEv3DrainOffset] = useState(0);

        useEffect(() => {
          const vehiclesList = ['EV-001', 'EV-002', 'EV-003', 'EV-004'];
          vehiclesList.forEach((id, index) => {
            setTimeout(() => {
              const vehicle = vehicles.find(v => v.id === id);
              if (vehicle) {
                setAnimatedSoh(prev => ({ ...prev, [id]: vehicle.healthScore }));
              }
            }, index * 300);
          });

          const loadTimer = setTimeout(() => {
            setHasLoaded(true);
          }, 1500);

          return () => clearTimeout(loadTimer);
        }, []);

        useEffect(() => {
          if (!hasLoaded) return;
          vehicles.forEach(vehicle => {
            setAnimatedSoh(prev => ({ ...prev, [vehicle.id]: vehicle.healthScore }));
          });
        }, [vehicles, hasLoaded]);

        useEffect(() => {
          if (!hasLoaded) return;
          const drainTimer = setInterval(() => {
            setEv3DrainOffset(prev => prev + 1);
          }, 10000);
          return () => clearInterval(drainTimer);
        }, [hasLoaded]);

        const tempHistoryData = Array.from({ length: 24 }, (_, i) => ({
          hour: `${String(i).padStart(2, '0')}:00`,
          'EV-001': parseFloat((33.5 + Math.sin(i / 2) * 1.2).toFixed(1)),
          'EV-002': parseFloat((41.2 + Math.cos(i / 2) * 1.5).toFixed(1)),
          'EV-003': parseFloat((48.0 + Math.sin(i) * 2.1).toFixed(1)),
          'EV-004': parseFloat((29.1 + Math.sin(i / 3) * 0.8).toFixed(1)),
        }));

        const cellVoltages = {
          'EV-001': [3.92, 3.91, 3.89, 3.92, 3.90, 3.91, 3.88, 3.90],
          'EV-002': [3.68, 3.52, 3.65, 3.48, 3.66, 3.61, 3.55, 3.60],
          'EV-003': [3.28, 3.42, 3.12, 3.39, 3.55, 3.82, 3.68, 3.75],
          'EV-004': [4.02, 4.01, 3.99, 4.02, 4.00, 4.01, 3.98, 4.00]
        };

        const getVoltageColorClass = (volts) => {
          if (volts > 3.8) return 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';
          if (volts >= 3.5) return 'bg-amber-500/20 text-amber-400 border-amber-500/30';
          return 'bg-red-500/20 text-red-400 border-red-500/30 animate-pulse';
        };

        const getGaugeColor = (soh) => {
          if (soh > 70) return '#00ff88';
          if (soh >= 40) return '#ffaa00';
          return '#ff4444';
        };

        const handleScheduleService = (id) => {
          setToast({ show: true, message: `Maintenance scheduled successfully for ${id}` });
          setTimeout(() => setToast({ show: false, message: '' }), 4000);
        };

        const effectiveSelected = selectedVehicle === 'Select Vehicle' ? 'EV-001' : selectedVehicle;

        const [pageLoading, setPageLoading] = useState(true);
        const [pageOpacity, setPageOpacity] = useState(0);

        useEffect(() => {
          const timer = setTimeout(() => {
            setPageLoading(false);
            setTimeout(() => setPageOpacity(1), 50);
          }, 1800);
          return () => clearTimeout(timer);
        }, []);

        return pageLoading ? (
          <BatteryHealthSkeleton />
        ) : (
          <div className="p-6 space-y-6 overflow-y-auto animate-fade-in flex-1" style={{ opacity: pageOpacity, transition: 'opacity 0.5s ease' }}>
            <h2 className="text-xl font-bold text-white">Diagnostic Battery Profiles</h2>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {vehicles.map(v => {
                const isIsolated = v.status === 'ISOLATED';
                const rawSoh = animatedSoh[v.id] || 0;
                const displaySoh = v.id === 'EV-003' ? Math.max(0, rawSoh - ev3DrainOffset) : rawSoh;

                let badgeStyle = "bg-emerald-500/10 text-emerald-400 border border-emerald-500/30";
                if (isIsolated) {
                  badgeStyle = "bg-slate-500/10 text-slate-400 border border-slate-500/30";
                } else if (v.status === 'critical') {
                  badgeStyle = "bg-red-500/10 text-red-400 border border-red-500/30 animate-pulse-subtle";
                } else if (v.status === 'warning') {
                  badgeStyle = "bg-amber-500/10 text-amber-400 border border-amber-500/30";
                }

                const cells = cellVoltages[v.id] || [];

                return (
                  <div key={v.id} className={`glass-card p-6 rounded-3xl border border-slate-800/60 relative flex flex-col justify-between transition-all duration-300 ${isIsolated ? 'opacity-40 grayscale bg-slate-950/20' : ''}`}>
                    <div className="flex justify-between items-center mb-3">
                      <span className="text-sm font-bold text-slate-200">{v.id}</span>
                      <span className={`px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${badgeStyle}`}>{v.status}</span>

                      <div className="relative w-[200px] h-[115px] flex items-center justify-center overflow-hidden">
                        <RadialBarChart
                          width={200}
                          height={200}
                          innerRadius="72%"
                          outerRadius="100%"
                          data={[{ value: displaySoh, fill: getGaugeColor(displaySoh) }]}
                          startAngle={180}
                          endAngle={0}
                          className="absolute top-0 left-0"
                        >

                        <div className="absolute bottom-2 flex flex-col items-center justify-center pointer-events-none">
                          <span className="text-2xl font-black text-white font-mono leading-none">{isIsolated ? '0' : displaySoh}%</span>
                          <span className="text-[9px] text-slate-500 font-bold uppercase mt-1 tracking-wider">State of Health</span>

                      </div>

                      </div>

                        <span className="text-[9px] text-slate-500 font-bold uppercase tracking-wider block">Pack Temp</span>

                      </div>
                      <div>
                        <span className="text-[9px] text-slate-500 font-bold uppercase tracking-wider block">Bus Voltage</span>
                        <span className="text-xs font-mono font-bold text-slate-200">{v.voltage} V</span>

                    <div className="space-y-2 mt-4 mb-5">

      function RangePredictor({ vehicles, setToast }) {
        const [soc, setSoc] = useState(88);
        const [pageLoading, setPageLoading] = useState(true);
        const [pageOpacity, setPageOpacity] = useState(0);

        useEffect(() => {
          const timer = setTimeout(() => {
            setPageLoading(false);
            setTimeout(() => setPageOpacity(1), 50);
          }, 1800);
          return () => clearTimeout(timer);
        }, []);

        const [temp, setTemp] = useState(34);
        const [weight, setWeight] = useState(120);
        const [mode, setMode] = useState('Normal');
        const [predictedRange, setPredictedRange] = useState(0);
        const [confidence, setConfidence] = useState(95);

        const calculateRange = (socVal, tempVal, weightVal, modeVal, sohBase = 100) => {
          const tempFactor = tempVal < 0 ? 0.6 : tempVal < 15 ? 0.8 : tempVal > 40 ? 0.85 : 1.0;
          const loadFactor = 1 - (weightVal / 500) * 0.25;
          const modeFactor = modeVal === 'Eco' ? 1.15 : modeVal === 'Normal' ? 1.0 : 0.82;
          return Math.round((socVal / 100) * 400 * tempFactor * loadFactor * modeFactor * (sohBase / 100));
        };

        useEffect(() => {
          const range = calculateRange(soc, temp, weight, mode, 100);
          setPredictedRange(range);

          let conf = 98 - (Math.abs(temp - 25) * 0.4) - ((weight / 500) * 8) - (mode === 'Sport' ? 4 : 0);
          setConfidence(Math.round(Math.max(60, Math.min(100, conf))));
        }, [soc, temp, weight, mode]);

        // Smooth number transition count up/down animation
        const [displayedRange, setDisplayedRange] = useState(0);
        useEffect(() => {
          let start = displayedRange;
          const end = predictedRange;
          if (start === end) return;

          const duration = 250;
          const startTime = performance.now();
          let animationFrameId;

          const animate = (currentTime) => {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const currentVal = Math.round(start + (end - start) * progress);
            setDisplayedRange(currentVal);

            if (progress < 1) {
              animationFrameId = requestAnimationFrame(animate);
            }
          };

          animationFrameId = requestAnimationFrame(animate);
          return () => cancelAnimationFrame(animationFrameId);
        }, [predictedRange]);

        const handleReset = () => {
          setSoc(88);
          setTemp(34);
          setWeight(120);
          setMode('Normal');
        };

        const handleApplyToFleet = () => {
          if (setToast) {
            setToast({ show: true, message: "Simulation parameters applied to all fleet telemetry forecasts." });
            setTimeout(() => setToast({ show: false, message: "" }), 4000);
          }
        };

        const getExplanation = () => {
          if (mode === 'Sport') {
            return "Sport mode increases torque response, reducing efficiency by 18%";
          }
          if (temp < 0) {
            return "Sub-zero temperature reduces battery chemistry activity by 40%";
          }
          if (temp < 15) {
            return "Cold temperature reduces battery chemistry efficiency by 20%";
          }
          if (temp > 40) {
            return "High temperature requires active thermal cooling, reducing range by 15%";
          }
          if (weight > 300) {
            return `High load weight (${weight} kg) increases rolling resistance and consumption`;
          }
          if (mode === 'Eco') {
            return "Eco mode optimizes throttle response, extending range by 15%";
          }
          return "Operating under optimal driving and climate conditions";
        };

        let rangeColor = 'text-emerald-400';
        let glowClass = 'glow-green';
        if (predictedRange < 150) {
          rangeColor = 'text-red-400';
          glowClass = 'glow-red';
        } else if (predictedRange <= 300) {
          rangeColor = 'text-amber-400';
          glowClass = 'glow-yellow';
        }

        return pageLoading ? (
          <RangePredictorSkeleton />
        ) : (
          <div className="p-6 space-y-6 overflow-y-auto animate-fade-in flex-1" style={{ opacity: pageOpacity, transition: 'opacity 0.5s ease' }}>
            <h2 className="text-xl font-bold text-white">AI Range Predictor Model</h2>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="glass-card p-6 rounded-2xl space-y-5 flex flex-col justify-between">
                <div className="space-y-5">
                  <h3 className="text-sm font-bold text-white uppercase tracking-wider mb-2">Simulation Parameters</h3>

                  <div className="space-y-1">
                    <div className="flex justify-between text-xs text-slate-400">
                      <span>SoC (%)</span>
                      <span className="text-emerald-400 font-bold font-mono">{soc}%</span>
                    </div>
                    <input type="range" min="0" max="100" value={soc} onChange={e => setSoc(parseInt(e.target.value))} className="w-full accent-emerald-500 bg-slate-900 h-1.5 rounded cursor-pointer" />
                  </div>

                  <div className="space-y-1">
                    <div className="flex justify-between text-xs text-slate-400">
                      <span>Temp (°C)</span>
                      <span className="text-amber-400 font-bold font-mono">{temp}°C</span>
                    </div>
                    <input type="range" min="-10" max="50" value={temp} onChange={e => setTemp(parseInt(e.target.value))} className="w-full accent-amber-500 bg-slate-900 h-1.5 rounded cursor-pointer" />
                  </div>

                  <div className="space-y-1">
                    <div className="flex justify-between text-xs text-slate-400">
                      <span>Weight (kg)</span>
                      <span className="text-blue-400 font-bold font-mono">{weight} kg</span>
                    </div>
                    <input type="range" min="0" max="500" value={weight} onChange={e => setWeight(parseInt(e.target.value))} className="w-full accent-blue-500 bg-slate-900 h-1.5 rounded cursor-pointer" />
                  </div>

                  <div className="space-y-1">
                    <span className="text-xs text-slate-400 font-medium">Drive Mode</span>
                    <select
                      value={mode}
                      onChange={e => setMode(e.target.value)}
                      className="w-full bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-1.5 text-xs text-slate-200 focus:outline-none"
                    >
                      <option value="Eco">Eco</option>
                      <option value="Normal">Normal</option>
                      <option value="Sport">Sport</option>
                    </select>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-2 pt-4 border-t border-slate-800/40">
                  <button onClick={handleReset} className="py-2 px-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-semibold border border-slate-700/40 transition-colors">
                    Reset Defaults
                  </button>
                  <button onClick={handleApplyToFleet} className="py-2 px-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-xs font-semibold transition-colors">
                    Apply to Fleet
                  </button>
                </div>
              </div>

              <div className="lg:col-span-2 space-y-6">
                <div className={`glass-card p-10 rounded-2xl flex flex-col justify-center items-center text-center relative overflow-hidden transition-all duration-300 ${glowClass}`}>
                  <span className="text-[10px] uppercase font-mono font-bold px-3 py-1 bg-slate-950/40 text-slate-400 rounded-full border border-slate-800/60 tracking-wider">Predicted Range Output</span>
                  <h3 className={`text-6xl font-black mt-4 transition-colors duration-300 ${rangeColor}`}>
                    {displayedRange} <span className="text-xl text-slate-400 font-medium">km</span>
                  </h3>

                  <div className="w-full max-w-xs mt-6 space-y-2">
                    <div className="flex justify-between text-[10px] text-slate-400 font-bold uppercase">
                      <span>Model Confidence</span>
                      <span className="text-slate-300">{confidence}%</span>
                    </div>
                    <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-800/60">
                      <div className="h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full transition-all duration-300" style={{ width: `${confidence}%` }} />
                    </div>
                  </div>

                  <p className="text-xs text-slate-400 mt-6 font-medium bg-slate-950/30 border border-slate-900/60 px-4 py-2 rounded-xl max-w-sm">
                    {getExplanation()}
                  </p>
                </div>

                <div className="glass-card p-6 rounded-2xl">
                  <h3 className="text-xs font-bold text-white uppercase tracking-wider mb-3">Active Fleet Range Side-by-Side</h3>
                  
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-xs border-collapse">
                      <thead>
                        <tr className="border-b border-slate-800 text-slate-400 uppercase text-[9px] tracking-wider">
                          <th className="py-2.5 font-semibold">Vehicle</th>
                          <th className="py-2.5 font-semibold">Live SOH</th>
                          <th className="py-2.5 font-semibold">Live Temp</th>
                          <th className="py-2.5 font-semibold">Predicted Range</th>
                          <th className="py-2.5 font-semibold">Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {vehicles.map(v => {
                          const isIsolated = v.status === 'ISOLATED';
                          const range = isIsolated ? 0 : calculateRange(soc, temp, weight, mode, v.healthScore);
                          
                          let statusText = "Optimal";
                          let statusBadge = "bg-emerald-500/10 text-emerald-400 border border-emerald-500/30";
                          if (isIsolated) {
                            statusText = "Isolated";
                            statusBadge = "bg-slate-500/10 text-slate-400 border border-slate-500/30";
                          } else if (range < 150) {
                            statusText = "Critical Range";
                            statusBadge = "bg-red-500/10 text-red-400 border border-red-500/30";
                          } else if (range <= 300) {
                            statusText = "Thermal Advisory";
                            statusBadge = "bg-amber-500/10 text-amber-400 border border-amber-500/30";
                          }

                          return (
                            <tr key={v.id} className={`border-b border-slate-850 text-slate-300 transition-colors hover:bg-slate-800/10 ${isIsolated ? 'opacity-40' : ''}`}>
                              <td className="py-3 font-bold text-white">{v.id}</td>

        const [pageOpacity, setPageOpacity] = useState(0);

          const timer = setTimeout(() => {
            setPageLoading(false);
            setTimeout(() => setPageOpacity(1), 50);
          }, 1800);
          return () => clearTimeout(timer);
        }, []);

        // Status counts
        const healthyCount = vehicles.filter(v => v.status === 'healthy').length;
        const warningCount = vehicles.filter(v => v.status === 'warning').length;
        const criticalCount = vehicles.filter(v => v.status === 'critical' || v.status === 'ISOLATED').length;

        const coordinates = {
          'EV-001': [19.0760, 72.8777],

            pinColor = '#F59E0B'; // Warning yellow
            shadowColor = 'rgba(245, 158, 11, 0.4)';
          } else if (status === 'critical') {
            pinColor = '#EF4444'; // Critical red
            shadowColor = 'rgba(239, 68, 68, 0.5)';
          } else if (status === 'ISOLATED') {
            pinColor = '#94A3B8'; // Isolated gray

        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
          // Three descending beeps — subtle warning tone
          [0, 0.3, 0.6].forEach((delay, i) => {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880 - i * 110, audioCtx.currentTime + delay);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime + delay);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + delay + 0.05);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + delay + 0.25);

            oscillator.start(audioCtx.currentTime + delay);
            oscillator.stop(audioCtx.currentTime + delay + 0.3);
          });
        } catch (err) {
          console.log('Audio not available:', err);

      function App() {
        const [activeTab, setActiveTab] = useState('Dashboard');
        const [currentTime, setCurrentTime] = useState(new Date());
        const [vehicles, setVehicles] = useState(vehicleHealthData);
        const [preSelectedVehicle, setPreSelectedVehicle] = useState('Select Vehicle');

        useEffect(() => {
          window.switchStandaloneTab = (tabName, vehicleId) => {
            setActiveTab(tabName);
            if (vehicleId) {
              setPreSelectedVehicle(vehicleId);
            }
          };
          return () => {
            window.switchStandaloneTab = null;
          };
        }, []);
        const [alerts, setAlerts] = useState([
          ...initialAlertsFeed,
          {
            id: 'alt-8',
            vehicle: 'EV-004',
            message: 'Pack health recalibration completed',
            severity: 'warning',
            timestamp: '09:12:04',
            type: 'charging'
          }
        ]);

        const [settings, setSettings] = useState({
          thermalTriggerTemp: 49.0,
          criticalSohThreshold: 35.0,
          alertRefreshInterval: 8,
          emailAlerts: true,
          soundAlerts: false,
          autoIsolate: false
        });
        const [recommendations, setRecommendations] = useState([
          {
            id: 'rec-1',
            vehicle: 'EV-003',
            component: 'Battery Pack',
            icon: 'Battery',
            issue: 'Cell group 4 degrading rapidly',
            urgency: 'Critical',
            urgencyText: 'Act within 3 days',
            action: 'Replace cell group 4 immediately',
            cost: 45000,
            confidence: 94
          },
          {
            id: 'rec-2',
            vehicle: 'EV-002',
            component: 'Charging Contactor',
            icon: 'Zap',
            issue: 'High impedance detected',
            urgency: 'High',
            urgencyText: 'Act within 7 days',
            action: 'Inspect and replace contactor',
            cost: 12000,
            confidence: 88
          },
          {
            id: 'rec-3',
            vehicle: 'EV-001',
            component: 'Cooling System',
            icon: 'Thermometer',
            issue: 'Pack temp trending upward',
            urgency: 'Medium',
            urgencyText: 'Act within 14 days',
            action: 'Service cooling pump',
            cost: 8500,
            confidence: 79
          },
          {
            id: 'rec-4',
            vehicle: 'EV-004',
            component: 'Traction Motor',
            icon: 'Cpu',
            issue: 'Minor vibration anomaly',
            urgency: 'Low',
            urgencyText: 'Act within 30 days',
            action: 'Schedule motor inspection',
            cost: 5000,
            confidence: 68
          }
        ]);

        // Live update of one recommendation's confidence score every 30 seconds
        useEffect(() => {
          const timer = setInterval(() => {
            setRecommendations(prev => {
              const idx = Math.floor(Math.random() * prev.length);
              return prev.map((rec, i) => {
                if (i === idx) {
                  const delta = Math.floor(Math.random() * 5) - 2;
                  const newConfidence = Math.max(50, Math.min(99, rec.confidence + delta));
                  return { ...rec, confidence: newConfidence };
                }
                return rec;
              });
            });
          }, 30000);
          return () => clearInterval(timer);
        }, []);
        const [showWarning, setShowWarning] = useState(false);
        const [isSnoozed, setIsSnoozed] = useState(false);
        const [detectionTime, setDetectionTime] = useState('');
        const [toast, setToast] = useState({ show: false, message: '' });

        const [countdown, setCountdown] = useState(30);
        const [countdownActive, setCountdownActive] = useState(false);
        const [isAutoIsolating, setIsAutoIsolating] = useState(false);
        const [isNotifying, setIsNotifying] = useState(false);
        const [isFrozen, setIsFrozen] = useState(false);
        const [tempHistory, setTempHistory] = useState([
          { time: '-9s', temp: 45.2 },
          { time: '-8s', temp: 46.1 },
          { time: '-7s', temp: 46.8 },
          { time: '-6s', temp: 47.3 },
          { time: '-5s', temp: 47.9 },
          { time: '-4s', temp: 48.6 },
          { time: '-3s', temp: 49.4 },
          { time: '-2s', temp: 50.1 },
          { time: '-1s', temp: 50.9 },
          { time: 'now', temp: 51.7 },
        ]);

        // Sound players
        const playBeep = (freq, duration) => {
          try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
              audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration - 0.05);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
          } catch (err) {
            console.log('Audio not available:', err);
          }
        };

        const playTripleBeep = () => {
          [0, 0.2, 0.4].forEach((delay) => {
            setTimeout(() => playBeep(520, 0.15), delay * 1000);
          });
        };

        const playUrgentBeep = () => {
          [0, 0.25].forEach((delay) => {
            setTimeout(() => {
              try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                  audioCtx.resume();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);

                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2 - 0.05);

                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
              } catch (err) {
                console.log('Audio not available:', err);
              }
            }, delay * 1000);
          });
        };

        // Start countdown when warning opens
        useEffect(() => {
          if (showWarning) {
            setCountdown(30);
            setCountdownActive(true);
            setIsAutoIsolating(false);
            setIsNotifying(false);
            setIsFrozen(false);
            setTempHistory([
              { time: '-9s', temp: 45.2 },
              { time: '-8s', temp: 46.1 },
              { time: '-7s', temp: 46.8 },
              { time: '-6s', temp: 47.3 },
              { time: '-5s', temp: 47.9 },
              { time: '-4s', temp: 48.6 },
              { time: '-3s', temp: 49.4 },
              { time: '-2s', temp: 50.1 },
              { time: '-1s', temp: 50.9 },
              { time: 'now', temp: 51.7 },
            ]);
          } else {
            setCountdownActive(false);
          }
        }, [showWarning]);

        // Tick every second
        useEffect(() => {
          if (!countdownActive) return;
          if (countdown <= 0) {
            setCountdownActive(false);
            setIsAutoIsolating(true);
            setIsFrozen(true);
            playUrgentBeep();
            setTimeout(() => {
              handleIsolateVehicle(true);
              setIsAutoIsolating(false);
            }, 2000);
            return;
          }
          const timer = setInterval(() => {
            setCountdown(prev => prev - 1);
          }, 1000);
          return () => clearInterval(timer);
        }, [countdown, countdownActive]);

        // Add new reading every second while popup is open
        useEffect(() => {
          if (!showWarning || isFrozen) return;
          const interval = setInterval(() => {
            setTempHistory(prev => {
              const lastTemp = prev[prev.length - 1].temp;
              const newTemp = Math.min(54.9, lastTemp + (Math.random() * 0.4 + 0.1));
              const newPoint = {
                time: 'now',
                temp: parseFloat(newTemp.toFixed(1))
              };
              const updated = prev.map((p, i) => ({
                ...p,
                time: `-${prev.length - i}s`
              }));
              return [...updated.slice(-9), newPoint];
            });
          }, 1000);
          return () => clearInterval(interval);
        }, [showWarning, isFrozen]);

        // Sound triggers at critical moments
        useEffect(() => {
          if (!countdownActive) return;
          if (countdown === 10) playBeep(440, 0.2);
          if (countdown === 5) playTripleBeep();
          if (countdown === 0) playUrgentBeep();
        }, [countdown, countdownActive]);

        const handleIsolateVehicleClick = () => {
          setIsFrozen(true);
          setCountdownActive(false);
          handleIsolateVehicle(false);
        };

        const handleAlertTechnicianClick = () => {
          setIsNotifying(true);
          setCountdownActive(false);
          handleAlertTechnician();
          setTimeout(() => {
            setIsNotifying(false);
          }, 3000);
        };

        const handleDismissWarningClick = () => {
          setCountdownActive(false);
          handleDismissWarning();
        };

        const ev3 = vehicles.find(v => v.id === 'EV-003');
        const isEv3Anomaly = ev3 && ev3.status !== 'ISOLATED' && (
          ev3.temp > settings.thermalTriggerTemp || ev3.healthScore < settings.criticalSohThreshold
        );

        useEffect(() => {
          if (isEv3Anomaly) {
            if (settings.autoIsolate) {
              handleIsolateVehicle();
            } else if (!isSnoozed && !showWarning) {
              setShowWarning(true);
              playThermalWarningSound();
              if (!detectionTime) {
                setDetectionTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
              }
            }
          } else {
            setShowWarning(false);
            setDetectionTime('');
          }
        }, [isEv3Anomaly, isSnoozed, settings.autoIsolate]);

        const handleDismissWarning = () => {
          setShowWarning(false);
          setIsSnoozed(true);
          setTimeout(() => setIsSnoozed(false), 30000);
        };

        const handleIsolateVehicle = (autoIsolated = false) => {
          setVehicles(prevVehicles => prevVehicles.map(v => {
            if (v.id === 'EV-003') return { ...v, status: 'ISOLATED' };
            return v;
          }));

          setToast({ show: true, message: autoIsolated ? 'Vehicle EV-003 auto-isolated successfully' : 'Vehicle EV-003 isolated successfully' });
          setTimeout(() => setToast({ show: false, message: '' }), 4000);

          const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          const newAlert = {
            id: `alt-${Date.now()}`,
            vehicle: 'EV-003',
            message: autoIsolated 
              ? 'EV-003 auto-isolated by Edge AI — no technician response detected'
              : 'Grid Disconnection: EV-003 isolated successfully due to thermal threat.',
            severity: 'critical',
            timestamp: timestamp,
            type: 'thermal'
          };
          setAlerts(prevAlerts => [newAlert, ...prevAlerts].slice(0, 7));
          setShowWarning(false);
        };

        const handleAlertTechnician = () => {
          setToast({ show: true, message: 'Technician notified via edge network' });
          setTimeout(() => setToast({ show: false, message: '' }), 4000);
        };

        useEffect(() => {
          const timer = setInterval(() => setCurrentTime(new Date()), 1000);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          const healthTimer = setInterval(() => {
            setVehicles(prevVehicles => prevVehicles.map(vehicle => {
              if (vehicle.status === 'ISOLATED') return vehicle;
              if (['EV-001', 'EV-002', 'EV-003', 'EV-004'].includes(vehicle.id)) {
                const change = Math.floor(Math.random() * 5) - 2;
                let newSoh = vehicle.healthScore + change;

                if (vehicle.id === 'EV-001') newSoh = Math.max(80, Math.min(85, newSoh));
                if (vehicle.id === 'EV-002') newSoh = Math.max(58, Math.min(64, newSoh));
                if (vehicle.id === 'EV-003') newSoh = Math.max(35, Math.min(41, newSoh));
                if (vehicle.id === 'EV-004') newSoh = Math.max(89, Math.min(93, newSoh));

                let newStatus = 'healthy';
                if (newSoh < settings.criticalSohThreshold) {
                  newStatus = 'critical';
                } else if (newSoh < 65) {
                  newStatus = 'warning';
                }

                return { ...vehicle, healthScore: newSoh, status: newStatus };
              }
              return vehicle;
            }));
          }, 5000);
          return () => clearInterval(healthTimer);
        }, [settings.criticalSohThreshold]);

        useEffect(() => {
          const tempTimer = setInterval(() => {
            setVehicles(prevVehicles => prevVehicles.map(vehicle => {
              if (vehicle.status === 'ISOLATED') return vehicle;
              let change = (Math.random() * 1.6 - 0.8);
              let newTemp = vehicle.temp + change;

              if (vehicle.id === 'EV-003') {
                newTemp = Math.max(46.5, Math.min(settings.thermalTriggerTemp + 2.5, newTemp));
              } else {
                if (vehicle.id === 'EV-001') newTemp = Math.max(32, Math.min(36, newTemp));
                if (vehicle.id === 'EV-002') newTemp = Math.max(40, Math.min(45, newTemp));
                if (vehicle.id === 'EV-004') newTemp = Math.max(30, Math.min(33, newTemp));
              }

              let socChange = Math.random() > 0.7 ? (Math.random() > 0.5 ? 1 : -1) : 0;
              let newSoc = Math.max(10, Math.min(100, vehicle.soc + socChange));
              
              let baseRange = vehicle.id === 'EV-001' ? 390 : vehicle.id === 'EV-002' ? 350 : vehicle.id === 'EV-003' ? 310 : 440;
              let newRange = Math.round(baseRange * (newSoc / 100) * (vehicle.healthScore / 100));

              return { ...vehicle, temp: parseFloat(newTemp.toFixed(1)), soc: newSoc, estimatedRange: newRange };
            }));
          }, 6000);

                if (m.includes('voltage drop') || t === 'voltage') return 'Isolation Forest';

                if (m.includes('soh drop') || m.includes('state of health')) return 'Degradation Predictor';

                doc.text(`Bus Voltage: ${v.voltage}V`, 18, currentY + 34);

                  actionText = 'Schedule maintenance review. Inspect cells delta.';

                lineStrokeWidth = 3;
              } else if (currentTemp >= 49) {
                lineColor = '#ff4444';
                lineStrokeWidth = 2;
              } else {
                lineColor = '#ff6b35';
                lineStrokeWidth = 2;
              }

              let popupBorderClass = "border-red-500 glow-red animate-pulse-subtle";
              if (countdown <= 5) {
                popupBorderClass = "border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.9)] animate-pulse-red animate-shake";
              } else if (countdown <= 10) {
                popupBorderClass = "border-red-500 shadow-[0_0_25px_rgba(239,68,68,0.8)] animate-shake";
              } else if (countdown <= 15) {
                popupBorderClass = "border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.75)]";
              }

              return (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-[9999] p-4 transition-all duration-300">
                  <div className={`bg-[#121824] border-2 rounded-3xl max-w-md w-full p-6 shadow-2xl transition-all duration-300 ${popupBorderClass}`}>
                    
                    {/* Countdown Display */}
                    <div className="flex flex-col items-center justify-center mb-5 mt-2">
                      <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase mb-2">
                        CRITICAL RESPONSE REQUIRED WITHIN
                      </p>
                      
                      <div className="relative flex items-center justify-center">
                        <svg width="140" height="140" viewBox="0 0 140 140" className="drop-shadow-lg">
                          {/* Background ring */}
                          <circle cx="70" cy="70" r={radius}
                            fill="none" stroke="#1a2332" strokeWidth="8" />
                          {/* Countdown ring */}
                          <circle cx="70" cy="70" r={radius}
                            fill="none" stroke={ringColor} strokeWidth="8"
                            strokeDasharray={circumference}
                            strokeDashoffset={strokeDashoffset}
                            strokeLinecap="round"
                            transform="rotate(-90 70 70)"
                            style={{ transition: 'stroke-dashoffset 1s linear, stroke 0.5s ease' }}
                          />
                          {/* Countdown number in center */}
                          <text 
                            x="70" 
                            y="70" 
                            textAnchor="middle" 
                            dominantBaseline="middle"
                            fontSize="36" 
                            fontWeight="black" 
                            fill={ringColor}
                            className={`font-mono transition-all duration-300 ${countdown <= 5 ? 'animate-flash-red text-red-500' : ''}`}
                          >
                            {countdown}
                          </text>
                        </svg>
                      </div>
                      
                      <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-2">
                        SECONDS
                      </p>
                    </div>

                    <div className="text-center mb-6">
                      <h2 className="text-xl font-black text-red-500 tracking-wide uppercase">
                        {isAutoIsolating ? "⚠ NO RESPONSE DETECTED — AUTO ISOLATING" : "⚠ THERMAL RUNAWAY RISK — EV-003"}
                      </h2>
                      <p className="text-xs text-slate-400 font-bold tracking-wider uppercase mt-1">
                        {isAutoIsolating ? "Safety isolation protocol initiated" : "Immediate intervention required"}
                      </p>
                    </div>

                    <div className="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-4 space-y-3 mb-6">
                      <div className="flex justify-between items-center pb-2.5 border-b border-slate-800/40">
                        <span className="text-xs text-slate-400 font-medium">Pack Temperature</span>
                        <span className="text-2xl font-black text-red-500 tracking-tight animate-pulse">
                          {ev3.temp}°C
                        </span>
                      </div>
                      <div className="flex justify-between items-center pb-2.5 border-b border-slate-800/40">
                        <span className="text-xs text-slate-400 font-medium">Current SOH</span>
                        <span className="text-sm font-bold text-slate-200">{ev3.healthScore}%</span>
                      </div>
                      <div className="flex justify-between items-center pb-2.5 border-b border-slate-800/40">
                        <span className="text-xs text-slate-400 font-medium">Cell Group Affected</span>
                        <span className="text-sm font-bold text-amber-400">Cell Group 4</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-xs text-slate-400 font-medium">Time of Detection</span>
                        <span className="text-sm font-mono text-slate-300 font-bold">{detectionTime}</span>
                      </div>
                    </div>

                    {/* Live Temperature Rising Graph */}
                    <div className="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-4 mb-4">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-[10px] text-slate-400 font-bold uppercase">Pack Temperature — Live Reading</span>
                        <div className="flex items-center gap-1.5">
                          <span className="text-base font-black tracking-tight transition-colors duration-300" style={{ color: lineColor }}>
                            {currentTemp.toFixed(1)}°C
                          </span>
                          <span className="text-[9px] font-extrabold uppercase px-1.5 py-0.5 bg-slate-950/40 rounded border border-slate-800/60 animate-pulse" style={{ color: isFrozen ? '#64748b' : lineColor }}>
                            {isFrozen ? 'Paused' : '↑ Rising'}
                          </span>
                        </div>
                      </div>

                      {isFrozen && (
                        <div className="text-center text-[10px] font-bold text-slate-400 bg-slate-800/40 py-1 rounded-lg border border-slate-800/60 mb-2">
                          ❄ Vehicle isolated — monitoring paused
                        </div>
                      )}

                      <ResponsiveContainer width="100%" height={120}>
                        <LineChart data={tempHistory} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                          <XAxis
                            dataKey="time"
                            tick={{ fill: '#888', fontSize: 10 }}
                            axisLine={false}
                            tickLine={false}
                          />
                          <YAxis
                            domain={[44, 55]}
                            tick={{ fill: '#888', fontSize: 10 }}
                            axisLine={false}
                            tickLine={false}
                            tickFormatter={v => `${v}°`}
                          />
                          <Tooltip
                            contentStyle={{
                              background: '#0f1923',
                              border: `0.5px solid ${lineColor}`,
                              borderRadius: '6px',
                              fontSize: '11px'
                            }}
                            formatter={v => [`${v}°C`, 'Pack Temp']}
                          />
                          {/* Danger zone threshold line */}
                          <ReferenceLine
                            y={49}
                            stroke="#ff4444"
                            strokeDasharray="4 4"
                            label={{
                              value: 'Danger 49°C',
                              fill: '#ff4444',
                              fontSize: 10,
                              position: 'insideTopRight'
                            }}
                          />
                          {/* Temperature line */}
                          <Line
                            type="monotone"
                            dataKey="temp"
                            stroke={lineColor}
                            strokeWidth={lineStrokeWidth}
                            dot={{ fill: lineColor, r: 3 }}
                            activeDot={{ r: 5, fill: '#ff4444' }}
                            isAnimationActive={true}
                            animationDuration={300}
                          />
                        </LineChart>
                      </ResponsiveContainer>
                    </div>

                    <div className="flex flex-col gap-2.5 mb-4">
                      <button
                        onClick={handleIsolateVehicleClick}
                        className={`w-full py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl text-xs font-extrabold uppercase tracking-wider transition-all shadow-lg shadow-red-950/20 ${countdownActive ? 'animate-pulsing-border border-red-500' : ''}`}
                      >
                        Isolate Vehicle
                      </button>
                      <button
                        onClick={handleAlertTechnicianClick}
                        disabled={isNotifying}
                        className="w-full py-3 bg-amber-500 hover:bg-amber-400 disabled:bg-amber-600/60 text-slate-950 rounded-xl text-xs font-extrabold uppercase tracking-wider transition-all shadow-lg shadow-amber-950/20 flex items-center justify-center gap-2"
                      >
                        {isNotifying && (
                          <svg className="animate-spin h-3.5 w-3.5 text-slate-950" fill="none" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                          </svg>
                        )}
                        <span>{isNotifying ? 'Notifying...' : 'Alert Technician'}</span>
                      </button>
                      <button
                        onClick={handleDismissWarningClick}
                        className="w-full py-3 bg-slate-800/60 hover:bg-slate-800 text-slate-400 hover:text-slate-200 border border-slate-700/30 rounded-xl text-xs font-extrabold uppercase tracking-wider transition-colors"
                      >
                        Dismiss Warning
                      </button>
                    </div>

                    <p className="text-[10px] text-center text-slate-500 font-semibold tracking-wide">
                      Edge AI anomaly verification via Isolation Forest model
                    </p>
                  </div>
                </div>
              );
            })()}

            {/* Edge Network Notification Toast */}
            {toast.show && (
              <div className="fixed bottom-6 right-6 bg-emerald-950/90 border border-emerald-500/50 px-5 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 z-[9999] animate-bounce-subtle">
                <div className="p-1 bg-emerald-500 rounded-full text-black">
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <span className="text-xs font-bold text-emerald-200">{toast.message}</span>
              </div>
            )}

          </div>
        );
      }

      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    </script>
  </body>
</html>
